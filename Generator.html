<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Contenido HTML</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: var(--light);
            color: var(--dark);
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }
        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .card {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.875rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <header>
        <h1>Título de la Página</h1>
        <p>Subtítulo o descripción corta del sitio web.</p>
    </header>

    <main>
        <section class="card">
            <h2>Sección Principal</h2>
            <p>Este bloque de código ha sido estructurado siguiendo los estándares semánticos modernos de HTML5 y estilos CSS optimizados.</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Tu Nombre o Empresa. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
